<!DOCTYPE html><html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmo Clicker</title>
  <style>
    *{box-sizing:border-box}body{
  margin:0;
  min-height:100vh;
  font-family:Arial,sans-serif;
  color:white;
  overflow-x:hidden;
  transition:0.8s;
  background:radial-gradient(circle at 20% 20%, #0b0f2a, #000 70%);
}

.stars{
  position:fixed;
  inset:0;
  background-image:radial-gradient(white 1px,transparent 1px);
  background-size:40px 40px;
  opacity:.2;
  animation:moveStars 90s linear infinite;
  z-index:0;
}

@keyframes moveStars{
  from{transform:translate(0,0)}
  to{transform:translate(-400px,-400px)}
}

.title{
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg,#4facfe,#00f2fe,#a770ef);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:glow 3s infinite alternate;
  margin-top:10px;
}

@keyframes glow{
  from{filter:drop-shadow(0 0 5px #00f2fe)}
  to{filter:drop-shadow(0 0 20px #a770ef)}
}

.container{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:15px;
  text-align:center;
}

.stats{
  margin-top:10px;
  padding:10px 15px;
  background:rgba(255,255,255,.06);
  border-radius:12px;
  backdrop-filter:blur(10px);
  font-size:14px;
  width:100%;
  max-width:420px;
}

.levelbar{
  width:100%;
  height:10px;
  background:#222;
  border-radius:20px;
  overflow:hidden;
  margin-top:8px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#4facfe,#00f2fe);
  transition:width .3s;
}

.big-button{
  width:130px;
  height:130px;
  border-radius:50%;
  border:none;
  font-size:18px;
  cursor:pointer;
  margin-top:20px;
  transition:transform .1s;
  color:white;
  background:radial-gradient(circle,#2d6cdf,#0b3d91);
  box-shadow:0 0 18px rgba(0,0,0,0.4);
}

.big-button:active{transform:scale(.9)}

.panel{
  margin-top:20px;
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,.06);
  padding:15px;
  border-radius:15px;
  backdrop-filter:blur(10px);
}

button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#667eea,#764ba2);
  color:white;
  font-size:14px;
  cursor:pointer;
}

.reset{
  width:100%;
  max-width:420px;
  margin-top:10px;
  padding:9px;
  font-size:12px;
  border-radius:8px;
  background:radial-gradient(circle,#1b3a6b,#0a1f3d);
}

  </style>
</head>
<body><div class="stars"></div><div class="container">  <div class="title">🚀 COSMO CLICKER</div>  <div class="stats">
    💰 Монеты: <span id="energy">0</span> |
    🧑‍🚀 Уровень: <span id="level">1</span> |
    🏅 Ранг: <span id="rank">Новичок</span>
    <div class="levelbar"><div class="fill" id="fill"></div></div>
  </div><button id="clickBtn" class="big-button" onclick="clickEnergy(event)">⚡</button>

  <div class="panel">
    <button onclick="buyAuto()">🌌 Авто-доход (<span id="autoCost">10</span>)</button>
    <button onclick="buyClick()">⚡ Сила клика (<span id="clickCost">20</span>)</button>
    <button onclick="changeSkin()">🎨 Сменить скин</button>
  </div><button class="reset" onclick="resetGame()">🗑 СБРОС</button>

</div><script>

let energy=0, perClick=1, perSecond=0;
let level=1, xp=0, need=50;
let autoCost=10, clickCost=20;
let skin=0;
let critChance=0.1;
let critMult=3;

const skins=[
  "radial-gradient(circle,#2d6cdf,#0b3d91)",
  "radial-gradient(circle,#ff416c,#ff4b2b)",
  "radial-gradient(circle,#00c6ff,#0072ff)",
  "radial-gradient(circle,#7F00FF,#E100FF)"
];

function getRank(){
  if(level<5)return"Новичок";
  if(level<10)return"Исследователь";
  if(level<20)return"Капитан";
  return"Император";
}

function setBg(){
  if(level<5)document.body.style.background="radial-gradient(circle,#0b0f2a,#000)";
  else if(level<10)document.body.style.background="radial-gradient(circle,#001a33,#000)";
  else if(level<20)document.body.style.background="radial-gradient(circle,#1a0033,#000)";
  else document.body.style.background="radial-gradient(circle,#330000,#000)";
}

function save(){
  localStorage.setItem("cosmo",JSON.stringify({energy,perClick,perSecond,level,xp,need,autoCost,clickCost,skin}));
}

function load(){
  let d=JSON.parse(localStorage.getItem("cosmo"));
  if(d){Object.assign(window,d)}
}

function updateUI(){
  document.getElementById("energy").innerText=Math.floor(energy);
  document.getElementById("level").innerText=level;
  document.getElementById("rank").innerText=getRank();
  document.getElementById("autoCost").innerText=autoCost;
  document.getElementById("clickCost").innerText=clickCost;
  document.getElementById("fill").style.width=(xp/need*100)+"%";

  document.getElementById("clickBtn").style.background=skins[skin];
  setBg();
}

function addXP(a){
  xp+=a;
  if(xp>=need){xp=0;level++;need=Math.floor(need*1.4);}
}

function clickEnergy(e){
  let isCrit=Math.random()<critChance;
  let gain=isCrit?perClick*critMult:perClick;

  energy+=gain;
  addXP(2);

  updateUI();save();
}

function buyAuto(){
  if(energy>=autoCost){energy-=autoCost;perSecond++;autoCost*=1.6;updateUI();save();}
}

function buyClick(){
  if(energy>=clickCost){energy-=clickCost;perClick++;clickCost*=1.7;updateUI();save();}
}

function changeSkin(){
  skin=(skin+1)%skins.length;
  updateUI();save();
}

function resetGame(){
  localStorage.removeItem("cosmo");location.reload();
}

setInterval(()=>{
  energy+=perSecond;
  addXP(perSecond);
  updateUI();save();
},1000);

load();updateUI();

</script></body>
</html>
